<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the Tower of Winds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 30% 20%, #d48c5c, #1e3b4d);
            font-family: 'Georgia', 'Times New Roman', serif;
        }
 
        .clock-wrapper {
            background: rgba(255, 245, 235, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px 40px;
            border-radius: 50px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
 
        .title {
            text-align: center;
            color: #f5e6c8;
            font-size: 14px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-family: 'Segoe UI', sans-serif;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6), 0 0 40px rgba(212, 175, 55, 0.3);
        }
 
        .date-row {
            color: rgba(240, 230, 208, 0.6);
            font-size: 18px;
            font-family: 'Georgia', 'Times New Roman', serif;
            letter-spacing: 4px;
            margin-bottom: 16px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
 
        .clock {
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }
 
        .unit { display: flex; gap: 4px; }
 
        .card {
            width: 46px;
            height: 72px;
            background: linear-gradient(180deg, #1e3845, #0c1a24);
            color: #f2ebe1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
        }
        .card::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1;
        }
 
        .char {
            position: relative;
            z-index: 2;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .char.changing {
            opacity: 0;
            transform: translateY(-8px);
        }
 
        .divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 0 2px;
        }
        .divider span {
            display: block;
            width: 7px; height: 7px;
            background: #f0e6d0;
            border-radius: 50%;
            opacity: 0.7;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.7; }
            50%      { opacity: 0.2; }
        }
 
        @media (max-width: 800px) {
            .clock-wrapper { padding: 20px; }
            .card { width: 36px; height: 56px; font-size: 28px; }
            .clock { gap: 8px; }
            .unit { gap: 3px; }
            .date-row { font-size: 14px; }
        }
        @media (max-width: 500px) {
            .card { width: 28px; height: 44px; font-size: 22px; }
            .clock { gap: 4px; }
        }
    </style>
</head>
<body>
    <div class="clock-wrapper">
        <div class="title">the Tower of Winds</div>
        <div class="date-row" id="dateDisplay">---- -- --</div>
        <div class="clock" id="clock"></div>
    </div>
 
    <script>
    (function () {
        'use strict';
 
        // 完整的罗马数字转换（支持 1~3999，0→'N'）
        function toRoman(num) {
            if (num === 0) return 'N';
            const romanNumerals = [
                { value: 1000, symbol: 'M' },
                { value: 900,  symbol: 'CM' },
                { value: 500,  symbol: 'D' },
                { value: 400,  symbol: 'CD' },
                { value: 100,  symbol: 'C' },
                { value: 90,   symbol: 'XC' },
                { value: 50,   symbol: 'L' },
                { value: 40,   symbol: 'XL' },
                { value: 10,   symbol: 'X' },
                { value: 9,    symbol: 'IX' },
                { value: 5,    symbol: 'V' },
                { value: 4,    symbol: 'IV' },
                { value: 1,    symbol: 'I' }
            ];
            let result = '';
            for (let i = 0; i < romanNumerals.length; i++) {
                while (num >= romanNumerals[i].value) {
                    result += romanNumerals[i].symbol;
                    num -= romanNumerals[i].value;
                }
            }
            return result;
        }
 
        function getRomanTime() {
            const now = new Date();
            return {
                h: toRoman(now.getHours()),
                m: toRoman(now.getMinutes()),
                s: toRoman(now.getSeconds())
            };
        }
 
        function getRomanDate() {
            const now = new Date();
            const y = toRoman(now.getFullYear());
            const m = toRoman(now.getMonth() + 1);
            const d = toRoman(now.getDate());
            return `${y} ${m} ${d}`;
        }
 
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('dateDisplay');
        const units = ['h', 'm', 's'];
        const unitData = [];
        const CARD_COUNT = 6;
 
        units.forEach((unit, idx) => {
            const unitDiv = document.createElement('div');
            unitDiv.className = 'unit';
 
            const cards = [];
            for (let i = 0; i < CARD_COUNT; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '<span class="char"> </span>';
                unitDiv.appendChild(card);
                cards.push(card);
            }
            clockEl.appendChild(unitDiv);
            unitData.push({ unit, cards });
 
            if (idx < units.length - 1) {
                const divider = document.createElement('div');
                divider.className = 'divider';
                divider.innerHTML = '<span></span><span></span>';
                clockEl.appendChild(divider);
            }
        });
 
        function updateClock() {
            const { h, m, s } = getRomanTime();
            const unitValues = [h, m, s];
 
            unitData.forEach((data, idx) => {
                let chars = (unitValues[idx] || 'N').split('');
                if (chars.length > CARD_COUNT) chars = chars.slice(0, CARD_COUNT);
                while (chars.length < CARD_COUNT) chars.unshift(' ');
 
                data.cards.forEach((card, i) => {
                    const newChar = chars[i] || ' ';
                    const charEl = card.querySelector('.char');
                    if (newChar !== charEl.textContent) {
                        charEl.classList.add('changing');
                        setTimeout(() => {
                            charEl.textContent = newChar;
                            charEl.classList.remove('changing');
                        }, 300);
                    }
                });
            });
 
            dateEl.textContent = getRomanDate();
        }
 
        updateClock();
        setInterval(updateClock, 1000);
    })();
    </script>
</body>
</html>
