<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the Tower of Winds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 30% 20%, #d48c5c, #1e3b4d);
            font-family: 'Georgia', 'Times New Roman', serif;
        }
 
        .clock-wrapper {
            background: rgba(255, 245, 235, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 50px;
            border-radius: 50px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.06);
        }
 
        .title {
            text-align: center;
            color: #f5e6c8;                /* 更亮的大理石白 */
            font-size: 14px;               /* 稍大一点，更醒目 */
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-family: 'Segoe UI', sans-serif;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6),   /* 金色光晕 */
                         0 0 40px rgba(212, 175, 55, 0.3);
        }
 
        .clock {
            display: flex;
            align-items: center;
            gap: 16px;
            user-select: none;
        }
 
        .unit { display: flex; gap: 6px; }
 
        /* —— 卡片：完整显示一个字符 —— */
        .card {
            width: 56px;
            height: 80px;
            background: linear-gradient(180deg, #1e3845, #0c1a24);
            color: #f2ebe1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 700;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
        }
        /* 中间装饰线（纯视觉，不做分割） */
        .card::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1;
        }
 
        .char {
            position: relative;
            z-index: 2;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .char.changing {
            opacity: 0;
            transform: translateY(-10px);
        }
 
        .divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 0 4px;
        }
        .divider span {
            display: block;
            width: 8px; height: 8px;
            background: #f0e6d0;
            border-radius: 50%;
            opacity: 0.7;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.7; }
            50%      { opacity: 0.2; }
        }
 
        @media (max-width: 700px) {
            .clock-wrapper { padding: 20px; }
            .card { width: 42px; height: 60px; font-size: 32px; }
            .clock { gap: 10px; }
            .unit  { gap: 4px; }
        }
        @media (max-width: 450px) {
            .card { width: 34px; height: 48px; font-size: 26px; }
            .clock { gap: 6px; }
        }
    </style>
</head>
<body>
    <div class="clock-wrapper">
        <div class="title">the Tower of Winds</div>
        <div class="clock" id="clock"></div>
    </div>
 
    <script>
    (function () {
        'use strict';
 
        function toRoman(n) {
            if (n === 0) return 'N';
            const values  = [50, 40, 10, 9, 5, 4, 1];
            const symbols = ['L','XL','X','IX','V','IV','I'];
            let result = '';
            for (let i = 0; i < values.length; i++) {
                while (n >= values[i]) {
                    result += symbols[i];
                    n -= values[i];
                }
            }
            return result;
        }
 
        function getRomanTime() {
            const now = new Date();
            return {
                h: toRoman(now.getHours()),
                m: toRoman(now.getMinutes()),
                s: toRoman(now.getSeconds())
            };
        }
 
        // ---- DOM 构建 ----
        const clockEl = document.getElementById('clock');
        const units = ['h', 'm', 's'];
        const unitData = [];
 
        units.forEach((unit, idx) => {
            const unitDiv = document.createElement('div');
            unitDiv.className = 'unit';
 
            const cards = [];
            for (let i = 0; i < 5; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '<span class="char"> </span>';
                unitDiv.appendChild(card);
                cards.push(card);
            }
            clockEl.appendChild(unitDiv);
            unitData.push({ unit, cards });
 
            if (idx < units.length - 1) {
                const divider = document.createElement('div');
                divider.className = 'divider';
                divider.innerHTML = '<span></span><span></span>';
                clockEl.appendChild(divider);
            }
        });
 
        // ---- 更新显示 ----
        function updateClock() {
            const { h, m, s } = getRomanTime();
            const unitValues = [h, m, s];
 
            unitData.forEach((data, idx) => {
                let chars = (unitValues[idx] || 'N').split('');
                if (chars.length > 5) chars = chars.slice(0, 5);
                while (chars.length < 5) chars.unshift(' ');
 
                data.cards.forEach((card, i) => {
                    const newChar = chars[i] || ' ';
                    const charEl = card.querySelector('.char');
                    if (newChar !== charEl.textContent) {
                        charEl.classList.add('changing');
                        setTimeout(() => {
                            charEl.textContent = newChar;
                            charEl.classList.remove('changing');
                        }, 300);
                    }
                });
            });
        }
 
        // ---- 启动 ----
        updateClock();
        setInterval(updateClock, 1000);
    })();
    </script>
</body>
</html>
